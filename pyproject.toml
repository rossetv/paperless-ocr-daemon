[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "paperless-ocr"
version = "1.0.0"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "openai==1.35.10",
    "Pillow==10.4.0",
    "pdf2image==1.17.0",
    "structlog==24.2.0",
]

[project.scripts]
paperless-ocr-daemon = "ocr.daemon:main"
paperless-classifier-daemon = "classifier.daemon:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (fast, no I/O)",
    "integration: Integration tests (module boundaries)",
    "e2e: End-to-end tests (full workflows)",
]
addopts = "-q --tb=short"
